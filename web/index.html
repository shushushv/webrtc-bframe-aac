<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WebRTC B-frame + AAC Player</title>
  <link rel="icon" href="data:,">
  <script src="video-player.js"></script>
  <script src="audio-player.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    button { font-size: 16px; padding: 8px 20px; cursor: pointer; }
    #status { margin-top: 12px; color: #555; }

    #mode-selector { margin-bottom: 14px; display: flex; gap: 0; }
    #mode-selector label {
      display: flex; align-items: flex-start; gap: 6px;
      padding: 10px 16px; border: 1px solid #ccc; cursor: pointer;
      user-select: none; background: #f9f9f9;
    }
    #mode-selector label:first-child { border-radius: 6px 0 0 6px; }
    #mode-selector label:last-child  { border-radius: 0 6px 6px 0; border-left: none; }
    #mode-selector input[type=radio] { margin-top: 3px; }
    #mode-selector label:has(input:checked) { background: #e8f0fe; border-color: #4285f4; }
    #mode-selector.disabled { opacity: 0.5; pointer-events: none; }
    .mode-title { font-weight: bold; font-size: 15px; }
    .mode-desc  { font-size: 12px; color: #666; margin-top: 2px; }

    #video-container { margin-top: 16px; }
    #stopBtn { margin-left: 8px; }
  </style>
</head>
<body>
  <h2>WebRTC H.264 B-frame + AAC Player</h2>

  <div id="mode-selector">
    <label>
      <input type="radio" name="renderMode" value="main" checked>
      <div>
        <div class="mode-title">TrackProcessor</div>
        <div class="mode-desc">B-frame reordering + AAC audio</div>
      </div>
    </label>
    <label>
      <input type="radio" name="renderMode" value="native">
      <div>
        <div class="mode-title">Native WebRTC</div>
        <div class="mode-desc">Raw browser pipeline (B-frame artifacts)</div>
      </div>
    </label>
  </div>

  <div>
    <button id="startBtn" onclick="startPlayback()">Subscribe</button>
    <button id="stopBtn" onclick="stopPlayback()" style="display:none">Disconnect</button>
  </div>
  <div id="status">Click Subscribe to start.</div>
  <div id="video-container"></div>
</body>
<script>
  const AUDIO_SAMPLE_RATE = 48000;
  let currentPc = null;
  let currentVideoPlayer = null;
  let currentAudioPlayer = null;

  // ── Controls ──────────────────────────────────────────────────────────────
  function getRenderMode() {
    return document.querySelector('input[name="renderMode"]:checked').value;
  }

  function setControlsEnabled(enabled) {
    document.getElementById('startBtn').disabled = !enabled;
    document.getElementById('mode-selector').classList.toggle('disabled', !enabled);
    document.querySelectorAll('input[name="renderMode"]').forEach(r => r.disabled = !enabled);
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  // ── Entry point ───────────────────────────────────────────────────────────
  async function startPlayback() {
    const mode = getRenderMode();
    setControlsEnabled(false);
    setStatus('Connecting…');

    currentVideoPlayer?.destroy();
    currentAudioPlayer?.destroy();
    currentVideoPlayer = null;
    currentAudioPlayer = null;

    const container = document.getElementById('video-container');
    container.innerHTML = '';

    if (mode === 'main') {
      currentVideoPlayer = new VideoPlayer({ bufferSize: 5 });
      currentVideoPlayer.init(container);

      currentAudioPlayer = new WebCodecsAudioPlayer();
      try {
        await currentAudioPlayer.init(AUDIO_SAMPLE_RATE, 2);
      } catch (e) {
        console.warn('[audio] init failed:', e);
        currentAudioPlayer = null;
      }
    } else {
      const video = document.createElement('video');
      video.autoplay = true;
      video.controls = true;
      video.playsInline = true;
      video.style.width = '640px';
      container.appendChild(video);
    }

    // encodedInsertableStreams is required for audio (WebCodecsAudioPlayer intercepts encoded frames).
    const pc = new RTCPeerConnection(
      currentAudioPlayer ? { encodedInsertableStreams: true } : {}
    );
    currentPc = pc;

    pc.onconnectionstatechange = () => {
      dbg(1, '[pc] connectionState:', pc.connectionState);
      if (['failed', 'disconnected', 'closed'].includes(pc.connectionState)) {
        stopPlayback();
      }
    };

    const videoTransceiver = pc.addTransceiver('video', { direction: 'recvonly' });
    const audioTransceiver = currentAudioPlayer
      ? pc.addTransceiver('audio', { direction: 'recvonly' })
      : null;

    if (mode === 'main') {
      setupMainReceivers(pc, videoTransceiver, audioTransceiver, currentVideoPlayer, currentAudioPlayer);
    } else {
      setupNativeReceiver(pc);
    }

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await waitForIceGathering(pc);
    dbg(1, '[signalling] offer created, ICE gathering complete', { offer: pc.localDescription.sdp });

    let outgoingSDP = pc.localDescription.sdp;
    if (currentAudioPlayer) {
      outgoingSDP = rewriteSDPAudioToAAC(outgoingSDP, AUDIO_SAMPLE_RATE);
      dbg(1, '[audio] SDP rewritten for MP4A-LATM at', AUDIO_SAMPLE_RATE);
    }

    const resp = await fetch('/whep', {
      method: 'POST',
      headers: { 'Content-Type': 'application/sdp' },
      body: outgoingSDP,
    });
    if (!resp.ok) {
      setStatus('Server error: ' + resp.status);
      stopPlayback();
      return;
    }
    const answerSDP = await resp.text();
    dbg(1, '[signalling] answer received', { answerSDP });
    await pc.setRemoteDescription({ type: 'answer', sdp: answerSDP });

    document.getElementById('stopBtn').style.display = '';
    if (mode === 'main') {
      setStatus(`Connected — TrackProcessor mode — audio ${currentAudioPlayer ? AUDIO_SAMPLE_RATE + ' Hz' : 'off'}`);
    } else {
      setStatus('Connected — Native WebRTC mode — audio off (B-frame artifacts expected)');
    }
  }

  function stopPlayback() {
    const pc = currentPc;
    currentPc = null;
    pc?.close();
    currentVideoPlayer?.destroy();
    currentAudioPlayer?.destroy();
    currentVideoPlayer = null;
    currentAudioPlayer = null;
    handleDisconnect();
  }

  function handleDisconnect() {
    document.getElementById('stopBtn').style.display = 'none';
    document.getElementById('startBtn').textContent = 'Reconnect';
    setControlsEnabled(true);
    setStatus('Disconnected — change mode or click Reconnect.');
  }

  // ── Main mode: TrackProcessor video + EncodedInsertableStreams audio ─────────
  function setupMainReceivers(pc, videoTransceiver, audioTransceiver, videoPlayer, audioPlayer) {
    // Video: encoded stream must be consumed synchronously when encodedInsertableStreams is set,
    // otherwise frames back-pressure and the decoder never receives them.
    // We pass through an empty TransformStream — decoded frames are pulled via TrackProcessor below.
    const { readable: vr, writable: vw } = videoTransceiver.receiver.createEncodedStreams();
    vr.pipeThrough(new TransformStream()).pipeTo(vw);

    // Audio: encoded frames are intercepted and decoded by WebCodecsAudioPlayer.
    if (audioTransceiver && audioPlayer) {
      const { readable: ar, writable: aw } = audioTransceiver.receiver.createEncodedStreams();
      ar.pipeThrough(new TransformStream({
        transform(encodedFrame, controller) {
          try { audioPlayer.decodeFrame(encodedFrame); } catch (e) { console.warn('[audio] decode error:', e); }
          controller.enqueue(encodedFrame);
        },
      })).pipeTo(aw);
    }

    // Video decoded frames are pulled from the native decoder via MediaStreamTrackProcessor.
    pc.ontrack = (event) => {
      if (event.track.kind === 'video') {
        dbg(1, '[video] track received, attaching TrackProcessor');
        videoPlayer.attachTrack(event.track);
      }
    };
  }

  // ── Native WebRTC mode ────────────────────────────────────────────────────
  function setupNativeReceiver(pc) {
    pc.ontrack = (event) => {
      if (event.track.kind === 'video') {
        dbg(1, '[native] video track received');
        const video = document.querySelector('#video-container video');
        if (video) {
          video.srcObject = event.streams[0] ?? new MediaStream([event.track]);
        }
      }
    };
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function waitForIceGathering(pc) {
    return new Promise((resolve) => {
      if (pc.iceGatheringState === 'complete') { resolve(); return; }
      pc.onicegatheringstatechange = () => {
        if (pc.iceGatheringState === 'complete') resolve();
      };
    });
  }
</script>
</html>
